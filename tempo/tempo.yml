# Tempo Configuration for Observatory
# Minimal local configuration with filesystem storage

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  max_block_bytes: 1_000_000
  complete_block_timeout: 15m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    pool:
      max_workers: 100
      queue_depth: 10000
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 1h
    compacted_block_retention: 1h
  compaction_interval: 10m

querier:
  query_frontend:
    max_parallelism: 10

query_frontend:
  max_parallelism: 10
  query_timeout: 30s

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: observatory
  storage:
    path: /var/tempo/generator
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

overrides:
  defaults:
    traces:
      generation_enabled: true