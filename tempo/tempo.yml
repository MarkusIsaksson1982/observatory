# Tempo Configuration for Observatory
# Minimal local configuration with filesystem storage

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    pool:
      max_workers: 100
      queue_depth: 10000
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 1h

metrics_generator:
  processor:
    span_metrics:
      dimensions:
        - http.method
        - http.route
        - http.status_code
      histogram_buckets:
        - 0.05
        - 0.1
        - 0.25
        - 0.5
        - 1
        - 2.5
        - 5
        - 10
  metrics_ingestion_time_range_slack: 5m
  registry:
    external_labels:
      source: tempo
      cluster: observatory
  storage:
    path: /var/tempo/generator
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics]
