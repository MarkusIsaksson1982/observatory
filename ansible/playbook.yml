---
# Observatory — Ansible host bootstrap + env templating
# Honestly scoped: 1 host (local), 2 concerns, tagged
# - provision: Docker install (Debian/Ubuntu only, needs become)
# - config: Templating .env and override (no become, safe for CI)

- name: Provision and configure Observatory host
  hosts: observatory
  gather_facts: true
  vars_files:
    - group_vars/all.yml

  tasks:
    - name: Show target environment
      ansible.builtin.debug:
        msg: "env={{ env_name }} -> {{ environments[env_name] }} on {{ ansible_distribution }} {{ ansible_distribution_version }}"
      tags: [always, config, provision]

    - name: Ensure apt cache is fresh
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: ansible_os_family == "Debian"
      tags: [provision]

    - name: Ensure Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
        state: present
      become: true
      when: ansible_os_family == "Debian"
      tags: [provision]

    - name: Ensure Docker engine and compose plugin
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
      become: true
      when: ansible_os_family == "Debian"
      tags: [provision]

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      become: true
      when: ansible_os_family == "Debian"
      tags: [provision]
      failed_when: false  # ok if not systemd inside container

    - name: Ensure repo root exists (idempotency check)
      ansible.builtin.stat:
        path: "{{ repo_root }}/docker-compose.yml"
      register: compose_stat
      tags: [always, config]

    - name: Fail if not run from repo checkout
      ansible.builtin.fail:
        msg: "docker-compose.yml not found at {{ repo_root }} — run from observatory/ansible/"
      when: not compose_stat.stat.exists
      tags: [always, config]

    - name: Template .env file
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ repo_root }}/.env"
        mode: "0600"
      tags: [config]

    - name: Template optional docker-compose.override.yml
      ansible.builtin.template:
        src: templates/docker-compose.override.yml.j2
        dest: "{{ repo_root }}/docker-compose.override.yml"
        mode: "0644"
      tags: [config]

    - name: Validate docker compose config
      ansible.builtin.command:
        cmd: docker compose config --quiet
        chdir: "{{ repo_root }}"
      changed_when: false
      tags: [config]
