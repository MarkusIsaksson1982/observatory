# Observatory — single-host, honestly scoped
# Real fleet would have staging/prod groups here. For portfolio we target localhost
# to show inventory, groups, and group_vars usage without inventing infrastructure.

[observatory]
observatory-host ansible_host=127.0.0.1 ansible_connection=local ansible_user={{ lookup('env','USER') }}

[observatory:vars]
# default env — override with -e env_name=staging or env_name=prod
env_name=local
