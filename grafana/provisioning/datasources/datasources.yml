# Grafana Datasources Provisioning
apiVersion: 1

datasources:
  - name: Mimir
    type: prometheus
    url: http://mimir:9009
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: traceID
          matcherRegex: "traceID=([a-f0-9]{32})"
          url: "$${__value.raw}"
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
        tags: ["traceID"]
      tracesToMetrics:
        datasourceUid: mimir
        tags: ["service.name"]
      nodeGraph:
        enabled: true