version: '3.8'

services:
  # Gateway service - entry point
  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    container_name: observatory-gateway
    restart: unless-stopped
    environment:
      - OTEL_SERVICE_NAME=gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - ORDERS_URL=http://orders:8000
      - PAYMENTS_URL=http://payments:8000
      - HTTP_TIMEOUT=5.0
      - ENVIRONMENT=local
    ports:
      - "8000:8000"
    depends_on:
      alloy:
        condition: service_healthy
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Grafana Alloy - Telemetry collector
  alloy:
    image: grafana/alloy:v1.5.0
    container_name: observatory-alloy
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Prometheus metrics
    volumes:
      - ./alloy/config.river:/etc/alloy/config.river:ro
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.river"]
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12345/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.1.0
    container_name: observatory-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - alloy
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Mimir - Metrics storage
  mimir:
    image: grafana/mimir:2.12.0
    container_name: observatory-mimir
    restart: unless-stopped
    ports:
      - "9009:9009"
    command:
      - -config.file=/etc/mimir/mimir.yml
    volumes:
      - ./mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9009/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Loki - Log aggregation
  loki:
    image: grafana/loki:3.1.0
    container_name: observatory-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Tempo - Trace storage
  tempo:
    image: grafana/tempo:2.5.0
    container_name: observatory-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - observatory-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  grafana-data:
  mimir-data:
  loki-data:
  tempo-data:

networks:
  observatory-network:
    driver: bridge
    name: observatory-network