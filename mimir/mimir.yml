# Mimir Configuration for Observatory
# Minimal local configuration with filesystem storage

server:
  http_listen_port: 9009
  grpc_listen_port: 9010

common:
  path_prefix: /data
  storage:
    filesystem:
      dir: /data
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1

limits:
  ingestion_rate: 10000
  ingestion_burst_size: 20000
  per_user_ingestion_rate: 10000
  per_user_ingestion_burst_size: 20000

compactor:
  working_directory: /data/compactor
  compaction_interval: 1h
  retention_enabled: true
  retention_delete_delay: 2h

ruler:
  storage:
    type: local
    local:
      path: /data/rules
  rule_path: /etc/mimir/rules
  alertmanager_url: http://alertmanager:9093
  enable_api: true
  ring:
    kvstore:
      store: inmemory

alertmanager:
  storage:
    type: local
    local:
      path: /data/alertmanager

# Enable /ready and /metrics endpoints
api:
  http_listen_port: 9009