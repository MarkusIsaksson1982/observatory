# Mimir Configuration for Observatory
# Minimal single-binary mode for Mimir 2.12

# Top-level auth flags (NOT under an auth: block)
multitenancy_enabled: false
no_auth_tenant: "tenant-0"

server:
  http_listen_port: 9009
  grpc_listen_port: 9010

common:
  storage:
    filesystem:
      dir: /data

ingester:
  ring:
    replication_factor: 1

limits:
  ingestion_rate: 10000
  ingestion_burst_size: 20000
  compactor_blocks_retention_period: 0s

compactor:
  data_dir: /tmp/mimir-compactor
  compaction_interval: 1h

ruler:
  rule_path: /tmp/mimir-ruler
  enable_api: true

ruler_storage:
  backend: local
  local:
    directory: /tmp/mimir-rules

alertmanager_storage:
  backend: local
  local:
    path: /tmp/mimir-alertmanager
